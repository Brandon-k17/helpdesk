name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/helpdesk

jobs:

  # ────────────────────────────────────────────────────────────────────
  # ÉTAPE 1 — Lint & Tests
  # ────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 helpdeskapp/ helpdesk_project/ \
            --max-line-length=120 \
            --exclude=migrations \
            --statistics

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: helpdesk_project.settings_test
        run: |
          coverage run --source=helpdeskapp manage.py test helpdeskapp \
            --settings=helpdesk_project.settings_test \
            --verbosity=2
          coverage xml -o coverage.xml
          coverage report --omit="*/tests*,*/migrations*,manage.py,*/settings*"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ────────────────────────────────────────────────────────────────────
  # ÉTAPE 2 — Code Quality (SonarCloud) — échoue si couverture < 80%
  # ────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: Code Quality (SonarCloud)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ────────────────────────────────────────────────────────────────────
  # ÉTAPE 3A — Build & Push Docker Hub
  # ────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────
  # ÉTAPE 3B — Déploiement FTP sur o2switch (en parallèle)
  # ────────────────────────────────────────────────────────────────────
  deploy-ftp:
    name: Deploy to o2switch (FTP)
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect static files
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'False'
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          DJANGO_SETTINGS_MODULE: helpdesk_project.settings
        run: python manage.py collectstatic --noinput

      - name: Create .deploy_pending trigger
        run: touch .deploy_pending

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/__pycache__/**
            **/*.pyc
            .env
            db.sqlite3
            venv/**
            env/**
            *.log
            .github/**

      - name: Deployment complete
        run: echo "✅ Code déployé — le cron o2switch va lancer post_deploy.sh automatiquement"
