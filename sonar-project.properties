sonar.projectKey=your-github-username_helpdesk
sonar.organization=your-sonarcloud-org

sonar.projectName=HelpDesk
sonar.projectVersion=1.0

sonar.sources=helpdeskapp,helpdesk_project
sonar.tests=helpdeskapp/tests.py
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/staticfiles/**

# Rapport de couverture généré par coverage.py
sonar.python.coverage.reportPaths=coverage.xml

# Seuil de qualité — le pipeline échoue si couverture < 80%
# Ce seuil est configuré dans l'interface SonarCloud :
# Quality Gates > Add Condition > Coverage < 80%
sonar.qualitygate.wait=true
